name: Bump a Development Dependency
permissions: {}
on:
    workflow_dispatch:
        inputs:
            package:
                description: "Name of the package to bump"
                required: true
                type: choice
                # Hard-coding options for safety
                # It's also useful as a record of which packages tend to need bumping
                options:
                    - black
                    - urllib
jobs:
    bump-dev-dep:
        permissions:
            contents: read # Required to checkout
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
              with:
                  persist-credentials: false

            - name: Set up uv
              uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d # v7.1.0
              with:
                  version: "latest"
                  enable-cache: true

            - name: Regenerate
              # Updates uv.lock, requirements.txt, and docs/requirements.txt
              run: uv run -P $PKG_TO_BUMP prek -a uv-export || true
              env:
                  PKG_TO_BUMP: ${{ inputs.package }}

            - name: Check for changes
              run: |
                  if [[ -n $(git status --porcelain) ]]; then
                      echo "Changes detected. Committing and pushing..."
                      git add uv.lock requirements.txt docs/requirements.txt
                      git commit -m "Bump $PKG_TO_BUMP dependency"
                      git push
                  else
                      echo "No changes detected. Nothing to commit."
                  fi
              env:
                  PKG_TO_BUMP: ${{ inputs.package }}

            - name: Create Pull Request
              uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: "Bump ${{ inputs.package }} dependency"
                  title: "Bump ${{ inputs.package }} development dependency"
                  body: "This PR was automatically generated by the bump-dev-dep workflow."
