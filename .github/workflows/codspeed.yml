name: CodSpeed
permissions: {}
on:
    workflow_dispatch:
    push:
        branches: ["main"]
        paths-ignore:
            - "docs/**"
            - "**/*.md"
            - "mkdocs.yml"
            - ".pre-commit-config.yaml"
    pull_request:
        paths-ignore:
            - "docs/**"
            - "**/*.md"
            - "mkdocs.yml"
            - ".pre-commit-config.yaml"
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    analyze:
        name: Analyze
        permissions:
            contents: read # required for actions/checkout
            pull-requests: write # Required for bot comments
            id-token: write # Required for OIDC authentication with CodSpeed
        runs-on: "ubuntu-latest"
        env:
            PYTHONIOENCODING: utf-8
        steps:
            - name: Checkout code
              uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
              with:
                  persist-credentials: false

            - name: Setup git user config
              run: |
                  git config --global user.name placeholder
                  git config --global user.email placeholder@example.com

            - name: Set up uv
              uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d # v7.1.0
              with:
                  version: "latest"
                  enable-cache: true
                  python-version: "3.13"

            - name: Run benchmarks
              uses: CodSpeedHQ/action@281164b0f014a4e7badd2c02cecad9b595b70537 # v4.11.1
              with:
                  mode: simulation
                  run: uv run --frozen pytest --codspeed
