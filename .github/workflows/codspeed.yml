name: CodSpeed
permissions: {}
on:
    workflow_dispatch:
    push:
        branches: ["main"]
        paths-ignore:
            - "docs/**"
            - "**/*.md"
            - "mkdocs.yml"
            - ".pre-commit-config.yaml"
            - "hooks/**"
            - "skills-lock.json"
    pull_request:
        paths-ignore:
            - "docs/**"
            - "**/*.md"
            - "mkdocs.yml"
            - ".pre-commit-config.yaml"
            - "hooks/**"
            - "skills-lock.json"
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    analyze:
        name: Analyze
        permissions:
            pull-requests: write # Required for bot comments
            id-token: write # Required for OIDC authentication with CodSpeed
        runs-on: "ubuntu-latest"
        env:
            PYTHONIOENCODING: utf-8
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup git user config
              run: |
                  git config --global user.name placeholder
                  git config --global user.email placeholder@example.com

            - name: Set up uv
              uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
              with:
                  version: "latest"
                  enable-cache: true

            # N.B. codspeed specifically requires the Python builds from actions/setup-python
            # https://codspeed.io/docs/benchmarks/python#usage-with-uv
            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0

            - name: Run benchmarks
              uses: CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd # v4.15.1
              with:
                  mode: simulation
                  run: uv run --frozen pytest --codspeed
