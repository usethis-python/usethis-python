name: "Copilot Setup Steps"
permissions: {}
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml
jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest
        permissions:
            contents: read # Required to checkout for the uv lockfile
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Set up uv
              uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
              with:
                  version: "latest"
                  enable-cache: true
                  activate-environment: true

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  cache: "npm"
                  cache-dependency-path: ".github/workflows/copilot-setup-steps.yml"

            - name: Install external agent skills
              env:
                  GIT_CONFIG_COUNT: "1"
                  GIT_CONFIG_KEY_0: core.autocrlf
                  GIT_CONFIG_VALUE_0: "false"
              run: |
                  npx skills experimental_install
                  if ! git diff --exit-code --quiet; then
                      echo "::warning::skills-lock.json is out of date. Removing installed skills and reverting changes."
                      rm -rf .agents/skills
                      git checkout .
                  fi

            - name: Setup dependencies
              run: uv sync

            - name: Install prek hooks
              run: uv run prek install
