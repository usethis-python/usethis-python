name: "Copilot Setup Steps"
permissions: {}
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml
jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest
        permissions:
            contents: read # Required to checkout for the uv lockfile
        steps:
            - name: Checkout code
              uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
              with:
                  persist-credentials: false

            - name: Set up uv
              uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d # v7.1.0
              with:
                  version: "latest"
                  enable-cache: true
                  activate-environment: true

            - name: Set up Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  cache: "npm"
                  cache-dependency-path: ".github/workflows/copilot-setup-steps.yml"

            - name: Install external agent skills
              env:
                  GIT_CONFIG_COUNT: "1"
                  GIT_CONFIG_KEY_0: core.autocrlf
                  GIT_CONFIG_VALUE_0: "false"
              run: |
                  npx skills experimental_install
                  if ! git diff --exit-code --quiet; then
                      echo "::warning::skills-lock.json is out of date. Removing installed skills and reverting changes."
                      rm -rf .agents/skills
                      git checkout .
                  fi

            - name: Setup dependencies
              run: uv sync

            - name: Install prek hooks
              run: uv run prek install
